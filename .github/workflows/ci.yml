name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    name: RSpec (template logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run unit specs
        run: bundle exec rspec
